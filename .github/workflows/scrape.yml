name: Run LinkedIn Scraper

on:
  repository_dispatch:
    types: [run-linkedin-scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: npm run scrape

      - name: Commit updated stats
        run: |
          if [ -n "$(git status --porcelain data/stats.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/stats.json
            git commit -m "chore: update scrape stats"
            git push origin main
          else
            echo "No stats changes to commit"
          fi
