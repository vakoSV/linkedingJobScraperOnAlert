name: Run LinkedIn Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      job_ids:
        description: Comma-separated LinkedIn job IDs
        required: false
        default: ""
  repository_dispatch:
    types: [trigger_scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare payload from repository dispatch
        if: github.event_name == 'repository_dispatch'
        run: |
          {
            echo 'CLIENT_PAYLOAD<<EOF'
            echo '${{ toJson(github.event.client_payload) }}'
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Prepare payload from manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo 'CLIENT_PAYLOAD<<EOF'
            echo '{"job_ids":"${{ inputs.job_ids }}"}'
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated stats
        run: |
          if [ -n "$(git status --porcelain data/stats.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/stats.json
            git commit -m "chore: update scrape stats"
            git push origin main
          else
            echo "No stats changes to commit"
          fi
