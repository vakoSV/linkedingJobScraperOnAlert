<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Scrape Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-7xl px-4 py-8 md:px-8">
      <header class="mb-6 rounded-2xl border border-slate-800 bg-slate-900/80 p-6">
        <p class="text-xs uppercase tracking-[0.2em] text-cyan-300">LinkedIn Intelligence</p>
        <h1 class="mt-2 text-2xl font-semibold md:text-3xl">Scraping Operations Dashboard</h1>
        <p id="generatedAt" class="mt-2 text-sm text-slate-400">Loading...</p>
      </header>

      <section class="mb-6 grid grid-cols-1 gap-3 md:grid-cols-4">
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
          <p class="text-xs uppercase tracking-wide text-slate-400">Total Events</p>
          <p id="totalEvents" class="mt-2 text-3xl font-semibold">0</p>
        </div>
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
          <p class="text-xs uppercase tracking-wide text-slate-400">Success Rate</p>
          <p id="successRate" class="mt-2 text-3xl font-semibold">0%</p>
        </div>
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
          <p class="text-xs uppercase tracking-wide text-slate-400">Top Country</p>
          <p id="topCountry" class="mt-2 text-2xl font-semibold">-</p>
        </div>
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
          <p class="text-xs uppercase tracking-wide text-slate-400">Remote + Hybrid</p>
          <p id="remoteHybridShare" class="mt-2 text-3xl font-semibold">0%</p>
        </div>
      </section>

      <section class="grid grid-cols-1 gap-4 lg:grid-cols-2">
        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <h2 class="mb-3 text-sm font-medium uppercase tracking-[0.18em] text-slate-300">Scrapes Per Day</h2>
          <canvas id="scrapesPerDayChart" height="220"></canvas>
        </article>
        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <h2 class="mb-3 text-sm font-medium uppercase tracking-[0.18em] text-slate-300">Workplace Type</h2>
          <canvas id="workplaceChart" height="220"></canvas>
        </article>
        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-4 lg:col-span-2">
          <h2 class="mb-3 text-sm font-medium uppercase tracking-[0.18em] text-slate-300">Top 5 Countries</h2>
          <canvas id="countryChart" height="200"></canvas>
        </article>
      </section>
    </div>

    <script>
      const chartTextColor = "#cbd5e1";
      const chartGridColor = "rgba(148, 163, 184, 0.15)";

      const normalizeWorkplace = (value) => {
        const text = String(value || "").toLowerCase();
        if (text.includes("remote")) return "Remote";
        if (text.includes("hybrid")) return "Hybrid";
        if (text.includes("on-site") || text.includes("on site") || text.includes("onsite")) return "On-site";
        return "Not Specified";
      };

      const countBy = (items, selector) => {
        const output = new Map();
        for (const item of items) {
          const key = selector(item);
          output.set(key, (output.get(key) || 0) + 1);
        }
        return output;
      };

      const bestKey = (map) => {
        let candidate = "-";
        let max = -1;
        for (const [key, value] of map.entries()) {
          if (value > max) {
            candidate = key;
            max = value;
          }
        }
        return candidate;
      };

      const dayKey = (timestamp) => {
        const date = new Date(timestamp);
        if (Number.isNaN(date.getTime())) return "Unknown";
        return date.toISOString().slice(0, 10);
      };

      const render = async () => {
        const response = await fetch("./data/stats.json", { cache: "no-store" });
        const data = await response.json();
        const events = Array.isArray(data.events) ? data.events : [];

        const successEvents = events.filter((event) => event.success_status === "success");
        const total = events.length;
        const successRate = total ? Math.round((successEvents.length / total) * 100) : 0;

        const workplaceCounts = countBy(events, (event) => normalizeWorkplace(event.workplace_type));
        const countryCounts = countBy(successEvents, (event) => event.country || "Unknown");
        const dayCounts = countBy(events, (event) => dayKey(event.timestamp));

        const remoteHybridCount = (workplaceCounts.get("Remote") || 0) + (workplaceCounts.get("Hybrid") || 0);
        const remoteHybridShare = total ? Math.round((remoteHybridCount / total) * 100) : 0;

        document.getElementById("generatedAt").textContent = `Updated ${new Date(
          data.generated_at || Date.now(),
        ).toLocaleString()}`;
        document.getElementById("totalEvents").textContent = String(total);
        document.getElementById("successRate").textContent = `${successRate}%`;
        document.getElementById("topCountry").textContent = bestKey(countryCounts);
        document.getElementById("remoteHybridShare").textContent = `${remoteHybridShare}%`;

        const sortedDays = Array.from(dayCounts.entries()).sort((a, b) => a[0].localeCompare(b[0]));
        new Chart(document.getElementById("scrapesPerDayChart"), {
          type: "line",
          data: {
            labels: sortedDays.map(([day]) => day),
            datasets: [
              {
                label: "Scrapes",
                data: sortedDays.map(([, value]) => value),
                borderColor: "#22d3ee",
                backgroundColor: "rgba(34, 211, 238, 0.2)",
                fill: true,
                tension: 0.3,
                pointRadius: 3,
              },
            ],
          },
          options: {
            plugins: {
              legend: { labels: { color: chartTextColor } },
            },
            scales: {
              x: { ticks: { color: chartTextColor }, grid: { color: chartGridColor } },
              y: { ticks: { color: chartTextColor, precision: 0 }, grid: { color: chartGridColor } },
            },
          },
        });

        new Chart(document.getElementById("workplaceChart"), {
          type: "doughnut",
          data: {
            labels: ["Remote", "Hybrid", "On-site", "Not Specified"],
            datasets: [
              {
                data: [
                  workplaceCounts.get("Remote") || 0,
                  workplaceCounts.get("Hybrid") || 0,
                  workplaceCounts.get("On-site") || 0,
                  workplaceCounts.get("Not Specified") || 0,
                ],
                backgroundColor: ["#38bdf8", "#22d3ee", "#14b8a6", "#64748b"],
                borderColor: "#0f172a",
              },
            ],
          },
          options: {
            plugins: { legend: { labels: { color: chartTextColor } } },
          },
        });

        const topCountries = Array.from(countryCounts.entries())
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5);

        new Chart(document.getElementById("countryChart"), {
          type: "bar",
          data: {
            labels: topCountries.map(([country]) => country),
            datasets: [
              {
                label: "Successful Scrapes",
                data: topCountries.map(([, count]) => count),
                backgroundColor: "#0ea5e9",
                borderRadius: 8,
              },
            ],
          },
          options: {
            plugins: { legend: { labels: { color: chartTextColor } } },
            scales: {
              x: { ticks: { color: chartTextColor }, grid: { color: chartGridColor } },
              y: { ticks: { color: chartTextColor, precision: 0 }, grid: { color: chartGridColor } },
            },
          },
        });
      };

      render();
    </script>
  </body>
</html>
